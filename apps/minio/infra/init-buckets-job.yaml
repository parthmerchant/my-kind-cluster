apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: minio
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set local http://minio.minio.svc.cluster.local:9000 minioadmin minioadmin123
              mc mb --ignore-existing local/warehouse
              mc mb --ignore-existing local/spark-logs
              echo "Buckets initialized."
