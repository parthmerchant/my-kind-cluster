apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-app
  namespace: spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: pyspark-app:latest
  imagePullPolicy: Never
  mainApplicationFile: local:///opt/spark/work-dir/main.py
  sparkVersion: "3.5.3"
  restartPolicy:
    type: Never
  hadoopConf:
    fs.s3a.endpoint: http://minio.minio.svc.cluster.local:9000
    fs.s3a.access.key: minioadmin
    fs.s3a.secret.key: minioadmin123
    fs.s3a.path.style.access: "true"
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
  sparkConf:
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
    spark.sql.catalog.local: org.apache.iceberg.spark.SparkCatalog
    spark.sql.catalog.local.type: hadoop
    spark.sql.catalog.local.warehouse: s3a://warehouse/
    spark.jars.packages: org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
  driver:
    cores: 1
    memory: "1g"
    serviceAccount: spark
  executor:
    cores: 1
    instances: 2
    memory: "1g"
